    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#03070d" />
    <!-- Fonts: Plus Jakarta Sans (Headers) and Inter (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              orbitron: ['Plus Jakarta Sans', 'sans-serif'],
              rajdhani: ['Plus Jakarta Sans', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            colors: {
              neon: {
                cyan: '#60A5FA',
                'cyan-dim': '#3B82F6',
                purple: '#818CF8',
                'purple-dim': '#6366F1',
                green: '#3fb950',
                red: '#ff3333',
                amber: '#f59e0b',
                bg: '#03070d',
                panel: '#080c18',
                'panel-alt': '#0c1225',
                border: '#1e2a3a',
                'border-light': '#2d3f56'
              }
            },
            animation: {
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'scan': 'scan 2s linear infinite',
            },
            keyframes: {
              scan: {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(100%)' }
              }
            },
            boxShadow: {
              'glow-cyan': '0 0 20px rgba(96, 165, 250, 0.15)',
              'glow-cyan-lg': '0 0 40px rgba(96, 165, 250, 0.2)',
              'glow-purple': '0 0 20px rgba(129, 140, 248, 0.15)',
              'glow-green': '0 0 20px rgba(63, 185, 80, 0.15)',
              'glow-red': '0 0 20px rgba(255, 51, 51, 0.15)',
              'inner-soft': 'inset 0 1px 0 rgba(255,255,255,0.04), inset 0 0 20px rgba(0,0,0,0.3)',
            }
          }
        }
      }
    </script>
