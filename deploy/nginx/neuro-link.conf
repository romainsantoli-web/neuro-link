# Production Nginx config for Neuro-Link API + Frontend
# Place this file as /etc/nginx/sites-available/neuro-link.conf
# Then symlink into /etc/nginx/sites-enabled/

# Rate limit zones (per IP)
limit_req_zone $binary_remote_addr zone=api_limit_per_ip:20m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=api_conn_per_ip:20m;

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # TLS certs (Let's Encrypt example)
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Body limit aligned with backend max upload protection
    client_max_body_size 100M;

    # Frontend static build
    root /var/www/neuro-link-v18/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy -> FastAPI (uvicorn/gunicorn)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for model inference
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Dynamic protection at edge
        limit_req zone=api_limit_per_ip burst=20 nodelay;
        limit_conn api_conn_per_ip 20;

        # Block non-API-safe methods
        if ($request_method !~ ^(GET|POST|OPTIONS)$ ) {
            return 405;
        }
    }

    # Basic health route optional at root
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
