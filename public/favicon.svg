<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffea"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Neural ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#g)" stroke-width="3" opacity="0.8"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#00ffea" stroke-width="1.5" opacity="0.4"/>
  <!-- Brain nodes -->
  <circle cx="32" cy="16" r="3" fill="#00ffea"/>
  <circle cx="20" cy="26" r="2.5" fill="#00ffea" opacity="0.9"/>
  <circle cx="44" cy="26" r="2.5" fill="#00ffea" opacity="0.9"/>
  <circle cx="24" cy="38" r="2.5" fill="#a855f7" opacity="0.9"/>
  <circle cx="40" cy="38" r="2.5" fill="#a855f7" opacity="0.9"/>
  <circle cx="32" cy="48" r="3" fill="#a855f7"/>
  <circle cx="32" cy="32" r="4" fill="url(#g)"/>
  <!-- Synaptic connections -->
  <line x1="32" y1="16" x2="20" y2="26" stroke="#00ffea" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="16" x2="44" y2="26" stroke="#00ffea" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="26" x2="32" y2="32" stroke="#00ffea" stroke-width="1" opacity="0.4"/>
  <line x1="44" y1="26" x2="32" y2="32" stroke="#00ffea" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="32" x2="24" y2="38" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="32" x2="40" y2="38" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="38" x2="32" y2="48" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="38" x2="32" y2="48" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <!-- N letter hint -->
  <text x="32" y="36" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="12" fill="white" opacity="0.9">N</text>
</svg>
